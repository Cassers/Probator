# Production stack for Probator (deployed via Dokploy as a Compose service).
# app + piston + postgres share this network: the app reaches them by name
# (postgres:5432, piston:2000). Nothing is published publicly except the app,
# which Dokploy routes to via Traefik (it injects the domain labels).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: probator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-probator}
      POSTGRES_DB: probator
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  piston:
    image: ghcr.io/engineer-man/piston:latest
    privileged: true # Piston manages its own cgroup v2 sandbox
    environment:
      # Security hardening (see docs/SECURITY.md). Defaults leave memory UNBOUNDED.
      PISTON_DISABLE_NETWORKING: 'true'
      PISTON_RUN_MEMORY_LIMIT: '268435456' # 256 MB hard ceiling per run
      PISTON_COMPILE_MEMORY_LIMIT: '536870912' # 512 MB for compilation
      PISTON_RUN_TIMEOUT: '5000'
      PISTON_COMPILE_TIMEOUT: '10000'
      PISTON_RUN_CPU_TIME: '5000'
      PISTON_COMPILE_CPU_TIME: '10000'
      PISTON_MAX_PROCESS_COUNT: '64'
      PISTON_MAX_OPEN_FILES: '256'
      PISTON_MAX_FILE_SIZE: '5000000'
      PISTON_OUTPUT_MAX_SIZE: '65536'
      PISTON_MAX_CONCURRENT_JOBS: '12'
    volumes:
      # Reuse languages already installed on the host (python/c/c++/java).
      - /opt/piston/data:/piston
    tmpfs:
      - /tmp:exec
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://probator:${POSTGRES_PASSWORD:-probator}@postgres:5432/probator
      PISTON_URL: http://piston:2000
      SEED: '1'
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      # Discord OAuth (login de estudiantes). Vacío = login deshabilitado.
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      # Opcional: exigir pertenencia a un servidor de Discord.
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
    depends_on:
      - postgres
      - piston
    expose:
      - '3000'
    # default = stack-internal (reaches postgres/piston); dokploy-network = Traefik routing.
    networks:
      - default
      - dokploy-network
    restart: always

volumes:
  pgdata:

networks:
  dokploy-network:
    external: true
