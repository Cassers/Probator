# Judge0 CE — code execution engine for Probator.
# Deploy on the OVH VPS (Docker / Dokploy). Probator talks to `server` over HTTP.
#
# Quick start:
#   1) Copy judge0.conf.example -> judge0.conf and set REDIS_PASSWORD + POSTGRES_PASSWORD.
#   2) docker compose up -d db redis        # let them initialize
#   3) docker compose up -d                 # bring up server + workers
#   4) curl http://localhost:2358/languages # sanity check
#
# IMPORTANT: Judge0 needs cgroup/privileged access to sandbox code (isolate).
# On modern hosts you may need `cgroup_enable=memory swapaccount=1` in the kernel
# cmdline. See docs/JUDGE0.md.
services:
  server:
    image: judge0/judge0:1.13.1
    container_name: judge0-server
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - '2358:2358'
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  workers:
    image: judge0/judge0:1.13.1
    container_name: judge0-workers
    command: ['./scripts/workers']
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    container_name: judge0-db
    env_file: judge0.conf
    volumes:
      - judge0-db:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: judge0-redis
    command:
      [
        'bash',
        '-c',
        'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
      ]
    env_file: judge0.conf
    restart: always

volumes:
  judge0-db:
